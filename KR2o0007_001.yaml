body:
  text: 三國雜事卷上宋唐庚撰諸葛丞相為後主寫申韓管子六韜各一道學者責孔明不以經書輔道少主乃用六韜管子申韓之書吾謂不然人君不問撥亂守文要以知略為先後主寬厚仁義襟量有餘而權略智調是其所短當時識者咸以為憂六韜述兵權竒計管子貴輕重權衡申子核名實韓子引繩墨切事情施之後主正中其病矣藥無善惡要以對病為妙萬金良藥與疾不相值亦復何補哉法正為蜀郡太守揚武將軍一飯之德睚眦之怨無不報復或言其太橫亮曰主公之在公安也進退狼跋賴孝直為輔翼今翻然翺翔不可復制如何禁止使不得行其意耶孫盛評曰威福自下亡國之道安可以功臣而極其凌肆諸葛氏之言于是失政刑矣秦昭王以范睢之故至質平原君移書趙王以購魏齊之首李廣誅霸陵尉上書自劾武帝詔曰報恩復讐朕之所望于將軍也復何疑哉國家郭進為西山巡檢案西山原本作山西今據宋史郭進傳改正民訴進掠奪其女太祖怒曰汝小民配女當得小民今得吾貴臣顧不可耶驅出之案宋史李漢超傳漢超仕關南人有訴漢超强取其女為妾及貸而不償者太祖召謂之曰漢超朕之貴臣為其妾不愈於農婦乎責而遣之密諭漢超曰急還其女并所貸朕姑貫汝勿復為也漢超感泣誓以死報據此則奪女事乃是漢超所為此云郭進疑一事而傳聞異詞而三人者卒皆有以報國古之英主所以役使豪傑彼自有意義孫盛所見者小矣董昭建議曺公宜進爵國公九錫偹物以彰殊勳荀彧稱曹公興師夲為朝廷君子愛人以德不宜如此曹公由是不平彧以憂卒論者曰彧叶規曹氏案叶字三國志注作協考許慎說文解字曰協或作叶則本一字而異文以傾漢祚晚節立異無救運移管仲相桓公伐山戎伐陳蔡伐楚伐晉其意欲尊周耳而桓公遂有封禪之志文若依曹公平青徐平許洛平河朔平漢南其志欲尊漢耳而曹公遂有九錫之議管仲知封禪之不可許也故設詞以拒之文若知九錫之不可長也故遜詞以却之管仲幸故桓公從其說以全勤王之功文若不幸故曹公不用其語以成竊國之禍䆒其終始幸與不幸異耳用心豈不同耶論者何得非之華歆邴原管寧相善時人號為一龍歆為首原為腹寧為尾魏略云邴原管寧皆盛德之士而歆為之首則歆之為人可知矣漢書稱伏后之廢操使歆勒兵入宫收后后閉户匿壁中歆破户發壁而入此豈盛德之士哉操雖奸雄然用人各當其理方是之時魏氏羣臣如董昭夏侯惇賈詡程昱郭嘉之流為不少足以辦此何至使歆為之歆果賢耶操决不敢以此使之以此事操則歆决不得為賢者陳壽作原傳稱少與管寧俱以操尚稱初不及歆至作寧傳又稱與原歆相友豈三人相友而歆獨無操尚乎朋友出處不齊理宜有之操尚不同則非所以為友矣此余之所未解也夫建興五年丞相亮出屯漢中是歲丁未魏之太和元年吳之黃武六年也魏眀帝即位既已逾年君臣無間前此吳人攻夏口圍石陽不克是歲保境不動初孔明說先主以保有荆益西和諸戎南撫夷越外交孫權內修政理天下有變則遣上將向宛洛而將軍身出秦川則霸業可成漢室可興矣孔明始議如此至是天下寧有變耶而遽有此舉何哉曹公征烏丸遣使辟田疇疇戒門下趨嚴門人問曰昔袁公禮命五至而君不屈今曹公使一來而君若恐弗及何也疇笑曰此非而所知也即隨使者到軍或曰田疇辭聘於袁氏從辟於曹公門人怪之疇笑而不答何也曰難言也昔漢明帝問於吳良曰先帝召卿不至反從驃騎逰耶良曰先帝以禮待下故臣得以禮進退驃騎以法檢下故臣為法屈耳疇之用意蓋亦如此是時袁氏政寬故疇可得不至曹氏刻急故疇不敢不來來非慕義故終身不受封爵疇雖不言言在其中矣曹公定鄴祠袁氏墓哭之流涕孫盛評曰先王誅賞將以懲勸而盡哀於逆臣之家為政之道躓矣匿怨友人前哲所恥稅驂舊館義無虛涕道乖好絶何哭之有漢祖失之于項氏曹公遵謬於此舉百慮之一失也禹見刑人於市下車而哭之况劉項受命懷王約為兄弟而紹與操少相友善同起事而紹又盟主乎雖道乖好絶至於相傾然吾以公義討之以私恩哭之不以恩掩義亦不以義廢恩是古之道也何名為失哉孫氏之論非但僻學也蓋亦可謂小人矣章武三年四月先主崩於永安宫五月後主襲位於成都改元建興人君繼體踰年改元而章武三年五月改為建興此陳壽所以短孔明也以吾觀之似不為過古者人君雖立尚未即位也明年正月行即位之禮然後書即位而稱元年後世承襲之初固已即位矣稱元年不亦可乎故曰不為過也古者人君襲位未踰年不稱君故子猛不書王子般子赤不書公後世承襲之初固已稱君矣稱元不亦可乎故曰不為過也春秋之時未有一年而二名者如隱公之末年既名之為十一年矣不可復名為桓公元年自紀元以來有一歲而再易者矣有一歲而三四易者矣豈復以二名為嫌而曰不可乎故曰不為過也非特此也今之所謂元年者某君之一年也故必踰年而後稱之如前所云後世所謂元年者某號之一年耳嗣位而稱之可也踰年而後稱之亦可也建安十三年曹公自江陵征備至赤壁與備戰不利退保南郡世之為將者務多其兵而不知兵至三十萬難用矣前代以六十萬勝楚以四十萬勝秦惟王剪項籍二人而多多益辦者獨韓信能之自餘兵至三十萬未有得志者趙括以四十五萬敗於長平漢初合五諸侯兵五十六萬敗彭城以三十萬困於白登王恢引三十二萬伏馬邑無功王邑以百萬敗於昆陽黃巾以百萬敗於壽張苻堅以八十萬敗於合肥隋以九十萬敗於遼東其衆愈多其敗愈毒然猶有可諉者曰將不善若曹公可謂善將矣復以水軍六十萬號稱八十萬而敗於烏林是歲戰艦相接故為敵人所燒大衆屯聚故疫死者幾半此兵多為纍之明驗也以髙祖之才不過能將十萬衆則水軍六十萬當得如髙祖者六人乃能將之髙祖豈易得哉其敗也固宜曹公征下邳擒關羽以歸禮之甚厚而察其心神無久留之意使張遼以情問之羽嘆曰極知曹公待吾之厚然吾受劉將軍之恩終不可留要當立效報曹公而去及羽破顔良曹公知其必去厚加賞賜羽悉封還拜書告辭歸先主於袁軍左右請追之公曰彼各為其主勿追也羽為曹公所厚而終不忘其君可謂賢矣然戰國之士亦能之曹公得羽不殺厚待而用其力可謂賢矣然戰國之君亦能之至羽必欲立效以報曺然後封還所賜拜書告辭而去進退去就雍容可觀殆非戰國之士矣曹公知羽必去重賞以贐其歸戒左右勿追曰彼各為其主也內能平其氣不以彼我為心外能成羽之忠不私其力於已是猶有先王之遺風焉吾嘗論曹公曰是人能為善而不能不為惡能為善是以能享國不能不為惡是以不能取天下黃初二年八月魏遣太常邢正持節䇿權為吳王加九錫權受之是歲吳蜀相攻大戰於夷陵吳人卑詞事魏受其封爵恐魏之議其後耳而魏略以為權有僭意而自顧位輕故先卑而後倨之先卑者規得封爵以成僭竊之基後倨者冀見討伐以激怒其衆且吳至權三世矣其勢足以自立尚何以封爵為哉受封爵則君臣矣供職貢矣除邉關矣國有警急以事聞無得擅興兵攻擊矣羽書至則悉甲士從征矣非身入朝則遣侍子入宿衛矣彼藩國固然無足怪者一不從命則王師至討有詞矣然后發兵拒戰是抗上矣尚安能激怒其衆也哉既而魏責任子權不能堪卒叛之而為天下笑方其危急之時羣臣無魯仲連之識出一切之計以寬目前之急而陳壽以勾踐竒之勾踐事吳則嘗聞之矣受吳封爵則未之聞也魏明帝問黃權曰三國鼎立何者為正權對曰當以天文為正往歲熒惑守心文皇帝崩吳蜀平安此其證也權推魏為正統未必不然然權初無他說一以天文决之此非豫之所敢知也黃初四年三月癸邜月犯心大星占曰心為天王位王者惡之四月癸巳蜀先主殂於永安宫而二國皆自如天道豈易言哉晉天文志稱二石雖僭號其强弱常占昴宿尤關太微紫宫然以載記考之流星入紫宫而聰殞彗星掃太微而苻堅敗熒惑守帝座而吕隆破故知推論正統固自有理也晉庾翼與兄氷書曰歲星犯天關江東無故而季龍頻年閉關此復是天公憒憒無皂白之證也噫人之責天亦太詳矣為天者不亦難哉先主攻劉璋所至輒克置酒大㑹於涪謂龎統曰今日之㑹樂矣統曰伐人之國而以為歡非仁者之兵也先主曰武王克商前歌後舞非仁者耶涪之役陋矣何足論哉至於樂與不樂之義則有可得而言者傳曰師有功則奏凱歌又曰戰勝以喪禮居之二義孰是吾聞聖人無心以百姓為心其戰也本所以憂民之憂其勝也不得不樂民之樂故師有功則奏凱歌此不足怪者然道失而後德德失而後仁仁失而後義義失而後禮道至於禮其去夲逺矣而况於兵乎故戰勝以喪禮居之亦無足怪者言樂與不樂皆未之盡也古之處此者外則歌舞而內以喪禮居之黃初四年司徒華歆司空王昭尚書令陳羣太史許芝謁者左僕射諸葛誕各有書與諸葛亮陳天命人事欲使舉國稱藩不報魏之羣臣可謂不學無術而昧於識慮矣使其學術識慮有如漢蕭望之者當不為此舉動也漢宣帝時呼韓欵塞稱藩望之議以客禮待之使他日遁去於漢不為叛臣宣帝從之蓋方是時胸奴雖衰然素號敵國非東甌南粵比也名分一正遂不可易他日叛去何以處之發兵誅之則勢有所未能置之不問則無以令天下故方其柔順之時待以不臣之禮非獨示以謙德蓋將為後日久逺之慮也魏之自視何如宣帝吳蜀雖弱不至如呼韓之時彼來稱藩猶當待以弗臣况未服而强之耶前此加權封爵而為權所虧侮今復喻蜀稱藩為亮所不答自西自東自南自北無思不服者不如是之勞也興平二年袁術僭號於九江置南北郊是時荆州牧劉表亦郊祀天地漢不能制惟天子祀天地於郊惟魯得用郊郊祀之禮聖人之所甚重而後之亂人欲為大盜於天下未嘗不先盜其所甚重者此莊老之徒所以有聖人不死大盜不止之說也至揚子之論則又不然秦人祀白畤周不即禁卒舉天下而與之名分所在不得不重夫莊老之說儒者固已非之而揚子之論亦復有所未盡揚子惟知嚴名分以臨天下而不知能保天下者然後能守名分秦人之祀白畤周非不欲禁之力有所不能也然則欲守名分者先勉其所以保天下者哉諸葛孔明說先主以跨有荆益保其岩險天下變則命一上將以荆州之軍向宛雒而身率益州之衆以攻秦川先主稱善髙祖既破陳豨還至雒陽歎曰代居常山北而從山南有之逺乃立子常為代王以代郡雁門屬焉地固有封境雖接而形勢非便者矣荆州在山前距蜀五千餘里而蜀從後有之其勢實難非獨不能有荆州也雖得秦川亦不能守何者梁益險絶蓋自守之國而不可以兼并凡州之在山外者尺寸不能有此髙祖所以棄漢中而取三秦也權欲令太子登讀書習知近代之事以張昭有師法重煩勞之乃令張休從昭受讀還以授登劉備教禪以漢書而權亦令張昭以漢書授其子登世以權備之智不足以知二帝三王故其所以貽謀止於如此是大不然伊尹之訓太甲也稱有夏先后而不及唐虞周公之戒成王也稱商三宗而不及唐虞豈伊尹周公之智不足以知堯舜禹哉亦取其近於時切於事者而已權備之知誠不足擬伊尹周公至其教子不忽近而慕逺不貴名而賤實此亦伊尹周公之遺法也漢晉春秋曰孫皓聞羊陸和交以詰於抗抗曰臣不如是正足以彰其德耳于祜無傷也或以祜抗為失臣節兩譏之親仁善鄰者國家之事出竒克敵者將帥之職羊陸以將帥之職而修國家之事此論者所以譏其失莭也竊謂不然兵固多術矣有以力相傾者有以智相傾者有以德相傾者是亦出竒而已矣何名為失節哉然晉陽秋以為羊陸推僑札之好茲又過矣兵家詭道何僑札之有就如所云乃不足貴何則非吳鄭之使而敦僑札之分處方面之任而私境外之交此非以稱羊陸之美也三國雜事卷上
