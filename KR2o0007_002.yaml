body:
  text: 三國雜事卷下宋唐庚撰操征栁城備勸劉表襲許表不能用挾天子令諸侯其事始於齊桓晉文而齊桓晉文未嘗遷惠王襄王於齊晉也除難定亂興滅繼絶功效既著諸侯自服耳董卓以獻帝居長安李茂正以昭宗幸鳯翔發號施令動以制詔為名然而天下諸侯羣起而攻之何也無尺寸之功以取信於天下而有劫主之名以負謗於諸侯則天下諸侯羣起而攻之亦固其理也使表能勤王如桓文邪雖不襲許何害其為令諸侯哉如其不然雖襲許適足以致諸侯之師而已董卓李茂正是也亮出祁山南安天水安定三郡響應會馬謖敗三郡不守亮拔西縣千餘家還漢中漢全盛時日月所照橫目之民皆漢赤子其後德薄不能保有黎庶則舉江以東而投之吳割渭以北而捐之魏則民不棄漢而漢棄其民亮出祁山三郡望風響應而亮不能守則亮負於民而民不負亮方是之時固當集其所獲之衆痛自引咎而謝遣之使崤隴之民曉然皆知吾心則後日之舉不患其不至如其不然在彼猶在此也而亮拔西縣千餘家遷之漢中既不足以傷敵而使無辜之民流離轉徙違其宗族去其墳墓豈三郡所以響應之意哉此雖邊部之常然於孔明則有不應爾者此吾所以為之惜也孫亮太平二年宗室孫基盜乘御馬付獄侍中刁元奏曰基法應死然魯王早終唯陛下哀原之亮曰法者天下所共奈何以情相迫邪當思可以釋此者元曰赦有小大或天下或千里或百里隨意所及乃赦宫中基得以免吳之君臣可謂上下皆失其分矣漢世諸侯王有罪當誅丞相御史典客宗正廷尉奏請論如法制曰朕不忍致法其與列侯二千石議之於是丞相御史等又奏臣等謹與列侯二千石議皆曰宜論如法制曰朕不忍致法其廢勿王或削地若干夫論如法者有司以法守不忍致法者人主以道揆今亮人主也而論法元有司也而論情故曰吳之君臣可謂上下皆失其分矣魯肅勸權以荆州借備周瑜言備梟雄不宜以土地業之漢時荆州之地為郡者七劉表之殁南陽入于中原而荆州獨有南郡江夏武陵長沙桂陽零陵備之南奔劉琦以江夏從之其後四郡相繼歸附於是備有武陵長沙桂陽零陵之地曺仁既退關羽周瑜錯處南郡而備領荆州牧居公安則六郡之地備已悉據之矣其所以云借者猶韓信之言假也雖欲不與得乎魯肅之議正合良平躡足之幾而周瑜獨以為不然屢勝之家果不可與料敵哉建安二十年先主居公安使關羽爭荆州會曺公征漢先主恐失益州與吳連和分荆州引軍還蜀曺公征漢中先主聞之與吳連和分荆州是矣引軍還蜀非也是時蜀有南郡之地而先主以蜀兵五萬居公安若進據襄陽而羽帥五萬之衆以襲許卷甲疾趨五日而可至事成則天下未可量不成則漢中之師不攻而自退此兵法所謂攻其所必救者初曺公征栁城備勸表以襲許及備有荆州亦不能辦此信天命有在哉孫權稱尊議者以為交之無益而名體弗順宜絶之孔眀以為未可或曰孔明之不絶吳權耶正耶曰正也非權也六國之時諸侯皆僣矣孟子以為有王者作不皆比而誅之必教之不從而後誅之然則未教之罪王者有所不誅孔明之勢既未能有以教吳則吳之僣擬未可以遽責此王者之法也非權也吳欲以兵萬人討樊胄權問潘濬濬言五千兵足以禽胄因論胄可破狀權竒其言遣將五千斬平之權克荆州將吏悉降而濬獨堅卧不屈權輿致之濬伏床而泣悲不自勝其於所事何其厚也既而樊胄欲以武陵自拔歸蜀濬為權畫䇿卒自將討平之其於所厚又何薄也意者在君為君有不得不然者乎吾聞樂毅去燕適趙趙欲與之伐燕毅泣曰昔之事燕猶今之事趙也毅若獲戾放在他國終身不敢謀趙之徒隸況其國乎使樂毅愚人也則可樂毅少知事君則濬不得無罪矣晉侍中荀朂中書令和嶠奏使著作郎陳夀定故蜀丞相諸葛亮故事為二十四篇號諸葛氏集上之魏文帝即位求孔融之文以為不減班揚晉武帝踐阼詔定諸葛亮故事而比之周誥融既魏武之讐恨而亮亦晉宣之仇敵二人之言宜非當時之所欲聞而並見收録惟恐其墜失蕩然無忌猶有先王大公至正之道存焉此吾所以特有取於魏晉也魏眀帝即位撫軍大將軍司馬懿鎮軍大將軍陳羣征東大將軍曺休中軍大將軍曺真並開府漢初置丞相御史府後置三公府將帥出征置幕府軍罷即廢不常置也今魏既置三公而懿等並為大將軍開府京師此何理也公室之卑蓋自此始矣蜀將李平聞懿等開府辟召以説孔眀孔眀鄙之是時中原人物推陳長文為第一今長文亦為此餘無足道矣建安十八年漢帝詔并十四州復為九州三桓諷魯作三軍合周禮矣其志乃欲卑公室而奪之權曺操諷漢復九州合禹貢矣其志乃欲廣兾州而益其地夫引經術稱古誼者固未必皆姦人而姦人之欲濟其邪謀者亦未嘗不引經術而稱古誼既不可以盡信亦不可以皆疑要在乎察之而已龎統説先主取益州先主曰今與吾為水火者曺操也操以急吾以寬操以暴吾以仁操以譎吾以忠每事相反乃可成爾以小故而失信於天下吾不為也寬勝急仁勝暴忠勝譎然操強而備弱宜勝而反不如者何也操稊稗者也備五榖之不􅍄者也五榖不熟固不若稊稗非謂寬仁忠信不能勝急暴譎詐也備不能勝操耳故曰茍非其人道不虛行青龍三年張掖出石圎廣一丈六尺髙一丈七尺一寸圍五丈八寸蒼質而白理有若麟者若鳯者有若虎者有若牛者有若人馬者有若八卦列宿孛彗者其字讀而不可曉時人以為魏晉之符河圖洛書之説歐陽永叔攻之甚力今觀此圖與河圖洛書亦何以異惜乎時無伏犧神禹故莫能通其義而陋者以為魏晉之符彼魏晉何足道安知其非八卦九疇之類也造化之所為猶有幸不幸焉而况於人乎可勝歎哉可勝歎哉蘇則為金城守聞魏氏代漢發服悲哭孫盛評曰士不非其所事不事其所非既以䇿名新朝復懷二志豈大雅君子出處之分哉魏氏受禪漢帝尚存縞素舉哀誠為輕脫然盛謂二志兹又過矣箕子過故商墟感宫室毁壞傷之欲哭以方朝而不敢季札哭王僚而事闔廬晏子哭莊公而事景公哀死事生以待天命此人臣之分也何得謂之非其所事而事其所非乎孫盛梟音使人聞而惡之諸葛亮聞張溫敗未知其故思之數日曰吾得之矣是人清濁善惡太分明也善惡太明誠取敗之道然人之禍敗有以其道得之者有不以其道得之者若張溫之敗可謂不以其道矣尚安可以推求其故哉魏文帝賜羣臣沒入生口唯歆出而嫁之帝歎息孫盛評曰子路私饋仲尼毁其食器田氏盜施春秋著以為譏孥戮之家國刑所肅縱在哀矜案縱字原夲作若今從三國志注改正理無偏宥歆居股肱之任當公言於朝而默受嘉賜獨為君子可謂匹夫之仁蹈道則未也孫盛以刻薄之資承學於草竊亂賊之世性習皆惡故其論議類皆如此夫見牛未見羊孟子所謂仁術也何名為偏宥哉使盛為廷尉於魏文之時則歆當以私饋盜施誅矣東晉之不用盛不為過也陳夀曰蜀不置史注記無官以故行事多遺災異靡書諸葛亮雖逹於為政若此之類猶未周焉禮記人君言則左史書之動則右史書之周禮建官偹矣獨不聞有所謂左右史者雖有太史然不以注記為職是時諸侯皆有史豈天子獨闕乎春秋之時卜田宅者占雲日者皆稱太史則太史殆隂陽家流然書趙盾者書崔杼者亦稱太史則太史又似掌注記者蓋方是時學者通知天人而卜興廢者亦不純用蓍龜太史伯以祝融之功而推楚國之必興太史趙以虞舜之德而占陳氏之未亡其議論證據有絶人者故隂陽注記得兼掌之漢司馬談父子為太史令以論著為己任而又掌天官則兼掌之效於兹可見魏晉之際始置著作郎自是太史之職分而為二孔明之時未也按後主景輝元年史官奏景星見於是大赦改元而曰蜀不置史妄矣景初元年有司奏魏得地統宜以建丑為正遂改是年三月為孟夏四月世言夏得人統以建寅為正商得地統以建丑為正周得天統以建子為正其説非也以堯典義和舜典巡狩觀之唐虞之世固以建寅為正矣至夏后之時其法尤偹其書傳於後世謂之夏小正孔子得之於把以為可用非謂建寅之正自夏后氏始也至成周時始用建子為正然猶不廢夏時謂之正嵗後之學者以為夏以建寅為正周以建子為正商居其間不應無所變改因以意推之曰商以建丑為正而三統之説興焉夫夏后氏以建寅為正吾於論語見之矣論語曰行夏之時周以建子為正吾於春秋見之矣春秋書十月降霜殺菽三月無冰商人以建丑為正於經既無所見於理亦復不通夫以建子為正者取二十四氣之首也以建寅為正者取四時之首也以建丑為正其取義安在哉是以知其不然建安十八年先主進軍圍雒縣龎統為流矢所中卒先主言則流涕龎德公以孔明為卧龍以士元為鳯雛則士元之齒當少於孔明孔明卒時年五十四而士元先卒二十有二年則士元物故尚未三十也豈不惜哉建安二十四年先主始王漢中是嵗關羽卒明年黃忠法正卒又明年張飛卒又明年馬超馬良卒基業未就而一時功臣相繼淪謝如有物奪之者明年後主踐阼而舊人獨有孔明趙雲後七年雲卒又五年孔明卒而勳舊於是乎盡正卒時四十五超四十七良三十五自餘不著其年飛傳稱少與羽俱事先主羽年長數嵗飛兄事之則飛卒時年才五十許霍峻年四十此數傑者皆以髙才早世而譙周至七十餘而終天不祚漢明矣三國雜事卷下
