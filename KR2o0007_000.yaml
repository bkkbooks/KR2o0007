body:
  text: 三國雜事史評類提要臣等謹案三國雜事二卷宋唐庚撰庚字子西眉州丹稜人紹聖中登進士第調利州治獄掾遷閬中令入為宗學博士張商英薦除提舉京西常平後坐為商英賦內前行謫居惠州大觀五年赦歸道卒是書雜論三國之事凡三十六篇并自序一篇後人皆編入庚文集考宋志載庚集二十二卷與今本同似此書原在集內然朝氏陳氏書目皆載庚集十卷知今本析其一卷為兩卷又益以此書二卷為二十二卷實非原本故永樂大典所載此書亦别為一編不著文集之目今仍别為二卷以還其舊陳振孫書録解題稱庚之文長於議論今觀其論諸葛亮寬待法正及不踰年改元事論荀彧爭曹操九錫事皆故與前人相反至亮之和吳本為權計而以為王道之正亮拔西縣千餘家本以招安而以為擾纍無辜皆不中理又謂商無建丑之說謂張掖石圖即河洛之文而惜無伏羲神農以識之尤為紕繆然其他議論可采者頗多醇駁並存瑕瑜不掩固亦尚論者之所節取耳乾隆四十六年二月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀三國雜事原序上自司馬遷史記下至五代史其間數千百年正統偏霸與夫僭竊亂賊甚微至弱之國外至蠻夷戎狄之邦史家未有不書國號者而三國志獨不然劉備父子相傳四十餘年始終號漢未嘗一稱蜀其稱蜀者流俗之語耳陳壽黜其正號從其俗稱循魏晉之私意廢史家之公法用意如此則其所書善惡褒貶與奪尚可信乎魏晉之世稱備為蜀猶五代稱李璟為吳稱劉崇為晉矣今五代史作南唐東漢世家未嘗以吳晉稱之獨陳壽如此初無義例直循好惡耳往時歐陽文忠公作五代史王荆公曰五代之事無足采者此何足煩公三國可喜事甚多悉為陳壽所壞可更為之文忠公然其言更不暇作也惜哉唐庚序
